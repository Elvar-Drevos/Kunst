<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Signage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #fff;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #slideshow {
    width: 100%;
    height: calc(100vh - 48px);
    position: relative;
  }

  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 1.2s ease-in-out;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .slide.active {
    opacity: 1;
    pointer-events: auto;
    z-index: 2;
  }

  .slide iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #111;
  }

  /* ── Clock Slide ── */
  #slide-clock {
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    flex-direction: column;
    gap: 10px;
  }
  #clock-time {
    font-size: 12vw;
    font-weight: 900;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  #clock-seconds {
    font-size: 4vw;
    font-weight: 300;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.3em;
  }
  #clock-date {
    font-size: 2.8vw;
    font-weight: 300;
    color: rgba(255,255,255,0.6);
    margin-top: 10px;
    text-transform: capitalize;
  }

  /* ── Weather Slide ── */
  #slide-weather {
    background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    flex-direction: column;
    padding: 4vw;
  }
  .weather-header {
    font-size: 2vw;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    margin-bottom: 1vw;
    text-transform: uppercase;
    letter-spacing: 0.3em;
  }
  .weather-main {
    display: flex;
    align-items: center;
    gap: 3vw;
    margin-bottom: 2vw;
  }
  .weather-icon {
    font-size: 10vw;
    line-height: 1;
  }
  .weather-temp {
    font-size: 10vw;
    font-weight: 900;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .weather-desc {
    font-size: 3vw;
    font-weight: 300;
    color: rgba(255,255,255,0.7);
    text-transform: capitalize;
    margin-bottom: 2vw;
  }
  .weather-details {
    display: flex;
    gap: 4vw;
    font-size: 1.6vw;
    color: rgba(255,255,255,0.5);
  }
  .weather-details span {
    display: flex;
    align-items: center;
    gap: 0.5vw;
  }

  /* ── News Slide ── */
  .news-slide {
    flex-direction: column;
    padding: 4vw;
  }
  .news-source {
    font-size: 1.8vw;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    margin-bottom: 2vw;
    opacity: 0.5;
  }
  .news-card {
    display: flex;
    gap: 3vw;
    width: 100%;
    max-width: 85vw;
  }
  .news-card img {
    width: 40%;
    height: 55vh;
    object-fit: cover;
    border-radius: 16px;
    flex-shrink: 0;
  }
  .news-card-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .news-card-text h2 {
    font-size: 3vw;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 1.5vw;
  }
  .news-card-text p {
    font-size: 1.6vw;
    line-height: 1.6;
    color: rgba(255,255,255,0.6);
  }

  .nos-slide { background: linear-gradient(135deg, #1a0a00, #2a1500, #0d0d0d); }
  .nos-slide .news-source { color: #f36d21; }
  .nos-slide .news-card-text h2 { color: #ffa366; }

  .nyt-slide { background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #0d0d0d); }
  .nyt-slide .news-source { color: #aaa; }

  .sky-slide { background: linear-gradient(135deg, #001029, #00204d, #0d0d0d); }
  .sky-slide .news-source { color: #c41230; }
  .sky-slide .news-card-text h2 { color: #e8d0d0; }

  /* ── Ticker ── */
  #ticker {
    width: 100%;
    height: 48px;
    position: fixed;
    bottom: 0;
    left: 0;
    z-index: 100;
    background: #111;
    border-top: 1px solid #222;
  }
  #ticker iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ── Progress bar ── */
  #progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    z-index: 50;
    transition: width 0.3s linear;
  }
</style>
</head>
<body>

<div id="progress-bar"></div>

<div id="slideshow">
  <!-- 1. Klok -->
  <div class="slide active" id="slide-clock" data-duration="12000">
    <div id="clock-time">00:00</div>
    <div id="clock-seconds">00</div>
    <div id="clock-date"></div>
  </div>

  <!-- 2. Weer -->
  <div class="slide" id="slide-weather" data-duration="15000">
    <div class="weather-header">Weer in Zwolle</div>
    <div class="weather-main">
      <div class="weather-icon" id="w-icon">☀️</div>
      <div class="weather-temp" id="w-temp">--°</div>
    </div>
    <div class="weather-desc" id="w-desc">Laden...</div>
    <div class="weather-details">
      <span id="w-feel">🌡️ Gevoels: --°</span>
      <span id="w-wind">💨 Wind: -- km/h</span>
      <span id="w-hum">💧 Luchtvochtigheid: --%</span>
    </div>
  </div>

  <!-- 3. Treinen -->
  <div class="slide" data-duration="20000">
    <iframe src="https://www.rijdendetreinen.nl/vertrektijden/station/zwolle?style=tb&time=alternate&lang=nl" loading="lazy"></iframe>
  </div>

  <!-- 4. Bus -->
  <div class="slide" data-duration="20000">
    <iframe src="https://drgl.nl/stop/NL:S:46004007" loading="lazy"></iframe>
  </div>

  <!-- 5. NOS Nieuws (2 artikelen, elk eigen sub-slide) -->
  <div class="slide news-slide nos-slide" id="nos-0" data-duration="10000">
    <div class="news-source">NOS Nieuws</div>
    <div class="news-card">
      <img id="nos-img-0" src="" alt="">
      <div class="news-card-text">
        <h2 id="nos-title-0">Laden...</h2>
        <p id="nos-desc-0"></p>
      </div>
    </div>
  </div>
  <div class="slide news-slide nos-slide" id="nos-1" data-duration="10000">
    <div class="news-source">NOS Nieuws</div>
    <div class="news-card">
      <img id="nos-img-1" src="" alt="">
      <div class="news-card-text">
        <h2 id="nos-title-1">Laden...</h2>
        <p id="nos-desc-1"></p>
      </div>
    </div>
  </div>

  <!-- 6. NYT (2 artikelen) -->
  <div class="slide news-slide nyt-slide" id="nyt-0" data-duration="10000">
    <div class="news-source">The New York Times</div>
    <div class="news-card">
      <img id="nyt-img-0" src="" alt="">
      <div class="news-card-text">
        <h2 id="nyt-title-0">Loading...</h2>
        <p id="nyt-desc-0"></p>
      </div>
    </div>
  </div>
  <div class="slide news-slide nyt-slide" id="nyt-1" data-duration="10000">
    <div class="news-source">The New York Times</div>
    <div class="news-card">
      <img id="nyt-img-1" src="" alt="">
      <div class="news-card-text">
        <h2 id="nyt-title-1">Loading...</h2>
        <p id="nyt-desc-1"></p>
      </div>
    </div>
  </div>

  <!-- 7. Google Trends -->
  <div class="slide" data-duration="20000">
    <iframe src="https://trends.google.com/trending?geo=NL&hours=24" loading="lazy"></iframe>
  </div>

  <!-- 8. Sky News (2 artikelen) -->
  <div class="slide news-slide sky-slide" id="sky-0" data-duration="10000">
    <div class="news-source">Sky News</div>
    <div class="news-card">
      <img id="sky-img-0" src="" alt="">
      <div class="news-card-text">
        <h2 id="sky-title-0">Loading...</h2>
        <p id="sky-desc-0"></p>
      </div>
    </div>
  </div>
  <div class="slide news-slide sky-slide" id="sky-1" data-duration="10000">
    <div class="news-source">Sky News</div>
    <div class="news-card">
      <img id="sky-img-1" src="" alt="">
      <div class="news-card-text">
        <h2 id="sky-title-1">Loading...</h2>
        <p id="sky-desc-1"></p>
      </div>
    </div>
  </div>

  <!-- 9. Geschiedenis -->
  <div class="slide" data-duration="20000">
    <iframe src="https://thomaz1200.github.io/Geschiedenis/" loading="lazy"></iframe>
  </div>
</div>

<!-- Ticker -->
<div id="ticker">
  <iframe src="https://thomaz1200.github.io/ticker/" loading="lazy"></iframe>
</div>

<script>
// ── Clock ──
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock-time').textContent = h + ':' + m;
  document.getElementById('clock-seconds').textContent = s;

  const days = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
  const months = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  document.getElementById('clock-date').textContent =
    days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}
setInterval(updateClock, 1000);
updateClock();

// ── Weather (wttr.in — no API key needed) ──
const weatherIcons = {
  '113': '☀️', '116': '⛅', '119': '☁️', '122': '☁️',
  '143': '🌫️', '176': '🌦️', '179': '🌨️', '182': '🌨️',
  '185': '🌨️', '200': '⛈️', '227': '🌨️', '230': '❄️',
  '248': '🌫️', '260': '🌫️', '263': '🌦️', '266': '🌧️',
  '281': '🌨️', '284': '🌨️', '293': '🌦️', '296': '🌧️',
  '299': '🌧️', '302': '🌧️', '305': '🌧️', '308': '🌧️',
  '311': '🌨️', '314': '🌨️', '317': '🌨️', '320': '🌨️',
  '323': '🌨️', '326': '🌨️', '329': '❄️', '332': '❄️',
  '335': '❄️', '338': '❄️', '350': '🌨️', '353': '🌦️',
  '356': '🌧️', '359': '🌧️', '362': '🌨️', '365': '🌨️',
  '368': '🌨️', '371': '❄️', '374': '🌨️', '377': '🌨️',
  '386': '⛈️', '389': '⛈️', '392': '⛈️', '395': '❄️'
};

async function fetchWeather() {
  try {
    const resp = await fetch('https://wttr.in/Zwolle?format=j1');
    const data = await resp.json();
    const cur = data.current_condition[0];
    const code = cur.weatherCode;
    document.getElementById('w-icon').textContent = weatherIcons[code] || '🌤️';
    document.getElementById('w-temp').textContent = cur.temp_C + '°';
    document.getElementById('w-desc').textContent = cur.lang_nl && cur.lang_nl[0] ? cur.lang_nl[0].value : cur.weatherDesc[0].value;
    document.getElementById('w-feel').textContent = '🌡️ Gevoels: ' + cur.FeelsLikeC + '°';
    document.getElementById('w-wind').textContent = '💨 Wind: ' + cur.windspeedKmph + ' km/h';
    document.getElementById('w-hum').textContent = '💧 Luchtvochtigheid: ' + cur.humidity + '%';
  } catch(e) {
    document.getElementById('w-desc').textContent = 'Weer kon niet worden geladen';
  }
}
fetchWeather();
setInterval(fetchWeather, 600000); // refresh every 10 min

// ── News (via rss2json) ──
const RSS_API = 'https://api.rss2json.com/v1/api.json?rss_url=';

async function fetchNews(feedUrl, prefix, count) {
  try {
    const resp = await fetch(RSS_API + encodeURIComponent(feedUrl));
    const data = await resp.json();
    const items = data.items.slice(0, count);
    items.forEach((item, i) => {
      const titleEl = document.getElementById(prefix + '-title-' + i);
      const descEl = document.getElementById(prefix + '-desc-' + i);
      const imgEl = document.getElementById(prefix + '-img-' + i);
      if (titleEl) titleEl.textContent = item.title;
      if (descEl) {
        // Strip HTML tags from description
        const tmp = document.createElement('div');
        tmp.innerHTML = item.description;
        let text = tmp.textContent || tmp.innerText || '';
        if (text.length > 300) text = text.substring(0, 300) + '…';
        descEl.textContent = text;
      }
      if (imgEl) {
        const thumb = item.thumbnail || item.enclosure?.link || '';
        if (thumb) {
          imgEl.src = thumb;
        } else {
          // Try to find image in description
          const m = item.description.match(/<img[^>]+src="([^"]+)"/);
          imgEl.src = m ? m[1] : 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"><rect fill="%23222" width="400" height="300"/><text x="200" y="150" fill="%23555" text-anchor="middle" font-size="20">Geen afbeelding</text></svg>';
        }
      }
    });
  } catch(e) {
    console.error('News fetch error for ' + prefix + ':', e);
  }
}

fetchNews('https://feeds.nos.nl/nosnieuwsalgemeen', 'nos', 2);
fetchNews('https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml', 'nyt', 2);
fetchNews('https://feeds.skynews.com/feeds/rss/home.xml', 'sky', 2);

// Refresh news every 5 minutes
setInterval(() => {
  fetchNews('https://feeds.nos.nl/nosnieuwsalgemeen', 'nos', 2);
  fetchNews('https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml', 'nyt', 2);
  fetchNews('https://feeds.skynews.com/feeds/rss/home.xml', 'sky', 2);
}, 300000);

// ── Slideshow ──
const slides = document.querySelectorAll('.slide');
let currentSlide = 0;
let progressTimer = null;

const progressBar = document.getElementById('progress-bar');

function showSlide(index) {
  slides.forEach(s => s.classList.remove('active'));
  slides[index].classList.add('active');
  currentSlide = index;

  // Progress bar animation
  const duration = parseInt(slides[index].dataset.duration) || 15000;
  progressBar.style.transition = 'none';
  progressBar.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      progressBar.style.transition = 'width ' + duration + 'ms linear';
      progressBar.style.width = '100%';
    });
  });

  clearTimeout(progressTimer);
  progressTimer = setTimeout(() => {
    const next = (currentSlide + 1) % slides.length;
    showSlide(next);
  }, duration);
}

// Start
showSlide(0);
</script>
</body>
</html>
