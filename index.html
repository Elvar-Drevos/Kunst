<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Signage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { height: 100%; }
  body {
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    height: 100%;
    overflow: hidden;
  }

  /* ═══ ROCK-SOLID LAYOUT ═══
     Wrapper is 100vh, split into slideshow + ticker.
     Nothing can overlap. */
  #wrapper {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  #slideshow {
    flex: 1 1 0;
    min-height: 0;
    position: relative;
    overflow: hidden;
  }
  #ticker-bar {
    flex: 0 0 52px;
    height: 52px;
    max-height: 52px;
    width: 100%;
    overflow: hidden;
    background: #0a0a0a;
    border-top: 2px solid rgba(255,255,255,0.08);
  }
  #ticker-bar iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ═══ SLIDES ═══ */
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .slide.active { opacity: 1; pointer-events: auto; z-index: 2; }
  .slide iframe { width: 100%; height: 100%; border: none; background: #0a0a0a; }

  /* ═══ PROGRESS BAR ═══ */
  #progress-bar {
    position: absolute; top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
    background-size: 300% 100%;
    animation: shimmer 3s linear infinite;
    z-index: 50;
  }
  @keyframes shimmer { 0%{background-position:0% 0} 100%{background-position:300% 0} }

  /* ═══════════════════════════════════
     1. CLOCK — Zwolle luchtfoto
     ═══════════════════════════════════ */
  #slide-clock { flex-direction: column; background: #000; }
  #slide-clock .bg {
    position: absolute; inset: 0;
    /* Uses local zwolle.jpg, falls back to wikimedia */
    background-image: url('zwolle.jpg'), url('https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Zwolle_Skyline_Rodetorenplein_04.JPG/1280px-Zwolle_Skyline_Rodetorenplein_04.JPG');
    background-size: cover;
    background-position: center 40%;
    filter: brightness(0.32) saturate(1.3);
  }
  #slide-clock .overlay {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.55) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.4) 100%);
  }
  #slide-clock .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
  }
  #clock-time {
    font-size: 18vw; font-weight: 900; letter-spacing: -0.04em;
    color: #fff;
    text-shadow: 0 0 150px rgba(102,126,234,0.35), 0 0 60px rgba(118,75,162,0.25), 0 6px 40px rgba(0,0,0,0.9);
    line-height: 1;
  }
  #clock-seconds {
    font-size: 3vw; font-weight: 300;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.8em;
    margin-top: 0.3vw;
  }
  #clock-date {
    font-size: 2.2vw; font-weight: 300;
    color: rgba(255,255,255,0.6);
    margin-top: 2vw;
    text-transform: capitalize;
    text-shadow: 0 2px 20px rgba(0,0,0,0.7);
    letter-spacing: 0.08em;
  }
  #clock-location {
    font-size: 0.85vw; font-weight: 600;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.8em;
    text-transform: uppercase;
    margin-top: 2.5vw;
    padding: 0.5vw 2.5vw;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.03);
  }

  /* ═══════════════════════════════════
     2. WEATHER — uitgebreid
     ═══════════════════════════════════ */
  #slide-weather { flex-direction: column; background: #000; }
  #slide-weather .weather-bg {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    filter: brightness(0.28) saturate(1.5);
    transition: background-image 1.5s ease;
  }
  #slide-weather .weather-overlay {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.5) 100%),
      radial-gradient(ellipse at 30% 40%, rgba(100,130,255,0.06), transparent 60%);
  }
  .weather-content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    width: 100%; height: 100%;
    justify-content: center; padding: 2vw;
  }
  .weather-city {
    font-size: 1vw; font-weight: 600;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.7em; text-transform: uppercase;
    margin-bottom: 1.5vw;
    padding: 0.4vw 2vw;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.03);
  }
  .weather-main { display: flex; align-items: center; gap: 2vw; margin-bottom: 0.5vw; }
  .weather-icon { font-size: 9vw; line-height: 1; filter: drop-shadow(0 0 40px rgba(255,255,255,0.1)); }
  .weather-temp-block { text-align: center; }
  .weather-temp {
    font-size: 12vw; font-weight: 900; color: #fff; line-height: 1;
    text-shadow: 0 0 80px rgba(255,255,255,0.08);
  }
  .weather-desc {
    font-size: 2.2vw; font-weight: 400;
    color: rgba(255,255,255,0.6);
    text-transform: capitalize; margin-top: 0.3vw;
  }
  .weather-stats {
    display: flex; gap: 1.2vw;
    margin: 2vw 0 1.5vw;
  }
  .weather-stat {
    display: flex; flex-direction: column; align-items: center;
    padding: 0.7vw 1.4vw;
    background: rgba(255,255,255,0.05);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.06);
    min-width: 7vw;
  }
  .weather-stat .ws-label {
    font-size: 0.7vw; font-weight: 600;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 0.3vw;
  }
  .weather-stat .ws-val {
    font-size: 1.2vw; font-weight: 700;
    color: rgba(255,255,255,0.8);
  }
  .weather-hourly {
    display: flex; gap: 0; margin-top: 0.8vw;
    background: rgba(255,255,255,0.04);
    border-radius: 20px;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .weather-hour {
    display: flex; flex-direction: column; align-items: center;
    gap: 0.3vw; padding: 0.8vw 1.4vw;
    border-right: 1px solid rgba(255,255,255,0.04);
  }
  .weather-hour:last-child { border-right: none; }
  .weather-hour .wh-time { font-size: 0.8vw; color: rgba(255,255,255,0.3); font-weight: 600; }
  .weather-hour .wh-icon { font-size: 1.6vw; }
  .weather-hour .wh-temp { font-size: 1vw; font-weight: 700; color: rgba(255,255,255,0.85); }
  .weather-hour .wh-rain { font-size: 0.65vw; color: #5bc0f8; font-weight: 500; }

  /* ═══════════════════════════════════
     NEWS SLIDES
     ═══════════════════════════════════ */
  .news-slide { padding: 0; overflow: hidden; }
  .news-slide .news-bg {
    position: absolute; inset: -60px;
    background-size: cover; background-position: center;
    filter: blur(60px) brightness(0.18) saturate(2);
  }
  .news-slide .news-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.35) 50%, rgba(0,0,0,0.65) 100%);
  }
  .news-slide .news-inner {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    width: 100%; height: 100%;
    padding: 2.5vw 4vw 2vw;
  }
  .news-logo-bar {
    display: flex; align-items: center; gap: 1vw;
    margin-bottom: 1.5vw; flex-shrink: 0;
  }
  .news-logo-bar img { height: 2.8vw; object-fit: contain; }
  .news-logo-bar .news-time-ago {
    margin-left: auto;
    font-size: 0.9vw; color: rgba(255,255,255,0.35); font-weight: 500;
    padding: 0.3vw 1vw;
    background: rgba(255,255,255,0.06);
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .news-card {
    display: flex; gap: 3vw;
    flex: 1; min-height: 0; width: 100%;
  }
  .news-card img.news-thumb {
    width: 42%; height: 100%;
    object-fit: cover; border-radius: 20px; flex-shrink: 0;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  }
  .news-card-text {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center;
    min-height: 0; overflow: hidden; padding-right: 1vw;
  }
  .news-card-text h2 {
    font-size: 2.6vw; font-weight: 700;
    line-height: 1.25; margin-bottom: 1.5vw;
    color: #fff; flex-shrink: 0;
  }
  .news-card-text .news-desc-wrap {
    flex: 1; min-height: 0;
    overflow: hidden; position: relative;
  }
  .news-card-text .news-desc-wrap::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 5vw;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.85));
    pointer-events: none; z-index: 3;
  }
  .news-card-text .news-desc-wrap p {
    font-size: 1.4vw; line-height: 1.75;
    color: rgba(255,255,255,0.5); position: relative;
  }

  /* Source accents */
  .nos-slide { background: #0d0808; }
  .nos-slide .news-card-text h2 { color: #ffcfaa; }
  .nos-slide .news-logo-bar img { filter: none; }

  .nyt-slide { background: #0d0d0d; }
  .nyt-slide .news-card-text h2 { color: #e8e8e8; }
  .nyt-slide .news-logo-bar img { filter: invert(1); height: 2vw; }

  .sky-slide { background: #080d18; }
  .sky-slide .news-card-text h2 { color: #c8d8f0; }
  .sky-slide .news-logo-bar img { filter: none; }

  .bright-slide { background: #0d0a08; }
  .bright-slide .news-card-text h2 { color: #ffd699; }
  .bright-logo {
    font-size: 2.5vw; font-weight: 900;
    color: #f90; letter-spacing: -0.03em; text-transform: lowercase;
  }
</style>
</head>

<script>
// ═══ CLOCK ═══
function updateClock() {
  const now = new Date();
  document.getElementById('clock-time').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock-seconds').textContent = String(now.getSeconds()).padStart(2,'0');
  const days = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
  const months = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  document.getElementById('clock-date').textContent =
    days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}
setInterval(updateClock, 1000);
updateClock();

// ═══ WEATHER ═══

  '113':'☀️','116':'⛅','119':'☁️','122':'☁️','143':'🌫️','176':'🌦️',

  '248':'🌫️','260':'🌫️','263':'🌦️','266':'🌧️','281':'🌨️','284':'🌨️',
  '293':'🌦️','296':'🌧️','299':'🌧️','302':'🌧️','305':'🌧️','308':'🌧️',
  '311':'🌨️','314':'🌨️','317':'🌨️','320':'🌨️','323':'🌨️','326':'🌨️',
  '329':'❄️','332':'❄️','335':'❄️','338':'❄️','350':'🌨️','353':'🌦️',
  '356':'🌧️','359':'🌧️','362':'🌨️','365':'🌨️','368':'🌨️','371':'❄️',
  '374':'🌨️','377':'🌨️','386':'⛈️','389':'⛈️','392':'⛈️','395':'❄️'
};
const weatherPhotos = {
  sunny:   'https://images.unsplash.com/photo-1601297183305-6df142704ea2?w=1920&q=80',
  cloudy:  'https://images.unsplash.com/photo-1534088568595-a066f410bcda?w=1920&q=80',
  rainy:   'https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?w=1920&q=80',
  stormy:  'https://images.unsplash.com/photo-1605727216801-e27ce1d0cc28?w=1920&q=80',
  snowy:   'https://images.unsplash.com/photo-1491002052546-bf38f186af56?w=1920&q=80',
  foggy:   'https://images.unsplash.com/photo-1487621167305-5d248087c724?w=1920&q=80',
  default: 'https://images.unsplash.com/photo-1534088568595-a066f410bcda?w=1920&q=80'
};
function getWeatherCat(code) {
  const c = parseInt(code);
  if (c===113) return 'sunny';
  if ([116,119,122].includes(c)) return 'cloudy';
  if ([143,248,260].includes(c)) return 'foggy';
  if ([176,263,266,293,296,299,302,305,308,353,356,359].includes(c)) return 'rainy';
  if ([200,386,389,392].includes(c)) return 'stormy';
  if ([179,182,185,227,230,281,284,311,314,317,320,323,326,329,332,335,338,350,362,365,368,371,374,377,395].includes(c)) return 'snowy';
  return 'default';
}

async function fetchWeather() {
  try {
    const data = await (await fetch('https://wttr.in/Zwolle?format=j1')).json();
    const cur = data.current_condition[0];
    const cat = getWeatherCat(cur.weatherCode);
    document.getElementById('weather-bg').style.backgroundImage = 'url(' + weatherPhotos[cat] + ')';
    document.getElementById('w-icon').textContent = weatherIcons[cur.weatherCode] || '🌤️';
    document.getElementById('w-temp').textContent = cur.temp_C + '°';
    document.getElementById('w-desc').textContent = cur.lang_nl?.[0]?.value || cur.weatherDesc[0].value;
    document.getElementById('w-feel').textContent = cur.FeelsLikeC + '°';
    document.getElementById('w-wind').textContent = cur.windspeedKmph + ' km/h';
    document.getElementById('w-hum').textContent = cur.humidity + '%';
    document.getElementById('w-uv').textContent = cur.uvIndex;
    document.getElementById('w-vis').textContent = cur.visibility + ' km';
    document.getElementById('w-pres').textContent = cur.pressure + ' hPa';

    // Hourly forecast
    const container = document.getElementById('w-hourly');
    container.innerHTML = '';
    const nowH = new Date().getHours();
    const allHours = [...(data.weather[0]?.hourly||[]), ...(data.weather[1]?.hourly||[])];
    const todayLen = data.weather[0]?.hourly?.length || 0;
    let shown = 0;
    for (let idx = 0; idx < allHours.length && shown < 8; idx++) {
      const h = allHours[idx];
      const hTime = parseInt(h.time) / 100;
      if (idx < todayLen && hTime <= nowH) continue;
      const div = document.createElement('div');
      div.className = 'weather-hour';
      div.innerHTML =
        '<span class="wh-time">' + String(hTime).padStart(2,'0') + ':00</span>' +
        '<span class="wh-icon">' + (weatherIcons[h.weatherCode]||'🌤️') + '</span>' +
        '<span class="wh-temp">' + h.tempC + '°</span>' +
        '<span class="wh-rain">💧' + h.chanceofrain + '%</span>';
      container.appendChild(div);
      shown++;
    }
  } catch(e) {
    document.getElementById('w-desc').textContent = 'Weer kon niet worden geladen';
  }
}
fetchWeather();
setInterval(fetchWeather, 600000);

// ═══ TIME AGO ═══
function timeAgo(dateStr) {
  const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
  if (diff < 60) return 'Zojuist';
  if (diff < 3600) return Math.floor(diff/60) + ' min geleden';
  if (diff < 86400) return Math.floor(diff/3600) + ' uur geleden';
  return Math.floor(diff/86400) + ' dag(en) geleden';
}

// ═══ NEWS ═══
const RSS_API = 'https://api.rss2json.com/v1/api.json?rss_url=';
const PLACEHOLDER = 'data:image/svg+xml,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600"><rect fill="#1a1a1a" width="800" height="600"/></svg>'
);

async function fetchNews(feedUrl, prefix, count) {
  try {
    const data = await (await fetch(RSS_API + encodeURIComponent(feedUrl))).json();
    if (!data.items?.length) return;
    data.items.slice(0, count).forEach((item, i) => {
      const el = (id) => document.getElementById(prefix + '-' + id + '-' + i);
      const titleEl = el('title'), descEl = el('desc'), imgEl = el('img'),
            agoEl = el('ago'), bgEl = el('bg');
      if (titleEl) titleEl.textContent = item.title;
      if (agoEl) { agoEl.textContent = timeAgo(item.pubDate); agoEl.dataset.pubdate = item.pubDate; }
      if (descEl) {
        const tmp = document.createElement('div');
        tmp.innerHTML = item.description;
        descEl.textContent = tmp.textContent || tmp.innerText || '';
      }
      let src = item.thumbnail || item.enclosure?.link || '';
      if (!src) {
        const m = item.description?.match(/<img[^>]+src="([^"]+)"/);
        src = m ? m[1] : PLACEHOLDER;
      }
      if (imgEl) imgEl.src = src;
      if (bgEl) bgEl.style.backgroundImage = 'url(' + src + ')';
    });
  } catch(e) { console.warn('News error (' + prefix + '):', e); }
}

function loadAllNews() {
  fetchNews('https://feeds.nos.nl/nosnieuwsalgemeen', 'nos', 2);
  fetchNews('https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml', 'nyt', 2);
  fetchNews('https://feeds.skynews.com/feeds/rss/home.xml', 'sky', 2);
  fetchNews('https://www.bright.nl/rss', 'bright', 2);
}
loadAllNews();
setInterval(loadAllNews, 300000);

// ═══ AUTO-SCROLL — slow & graceful ═══
function startAutoScroll(slideEl) {
  const wrap = slideEl.querySelector('.news-desc-wrap');
  if (!wrap) return;
  const p = wrap.querySelector('p');
  if (!p) return;
  p.style.transition = 'none';
  p.style.transform = 'translateY(0)';
  void p.offsetHeight;
  const overflow = p.scrollHeight - wrap.clientHeight;
  if (overflow > 20) {
    // Slow scroll: ~30px per second, starts after 3s
    const duration = overflow / 30;
    setTimeout(() => {
      p.style.transition = 'transform ' + duration + 's linear';
      p.style.transform = 'translateY(-' + overflow + 'px)';
    }, 3000);
  }
}

// ═══ SLIDESHOW ═══
const slides = document.querySelectorAll('.slide');
let currentSlide = 0, progressTimer = null;
const progressBar = document.getElementById('progress-bar');

function showSlide(index) {
  slides.forEach(s => s.classList.remove('active'));
  slides[index].classList.add('active');
  currentSlide = index;
  const slideEl = slides[index];
  startAutoScroll(slideEl);
  const agoEl = slideEl.querySelector('.news-time-ago');
  if (agoEl?.dataset.pubdate) agoEl.textContent = timeAgo(agoEl.dataset.pubdate);
  const duration = parseInt(slideEl.dataset.duration) || 15000;
  progressBar.style.transition = 'none';
  progressBar.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      progressBar.style.transition = 'width ' + duration + 'ms linear';
      progressBar.style.width = '100%';
    });
  });
  clearTimeout(progressTimer);
  progressTimer = setTimeout(() => showSlide((currentSlide + 1) % slides.length), duration);
}
showSlide(0);
