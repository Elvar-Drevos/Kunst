<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Signage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #fff;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* ── Layout: slideshow above ticker ── */
  #slideshow {
    width: 100%;
    height: calc(100vh - 52px);
    position: relative;
    overflow: hidden;
  }

  #ticker {
    width: 100%;
    height: 52px;
    position: relative;
    z-index: 100;
    background: #111;
    border-top: 2px solid #222;
    flex-shrink: 0;
  }
  #ticker iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ── Slides ── */
  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 1.2s ease-in-out;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
    z-index: 2;
  }
  .slide iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #111;
  }

  /* ── Progress bar ── */
  #progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
    z-index: 50;
    transition: width 0.3s linear;
  }

  /* ══════════════════════════════════
     1. CLOCK SLIDE — Zwolle background
     ══════════════════════════════════ */
  #slide-clock {
    flex-direction: column;
    gap: 10px;
    background: #000;
  }
  #slide-clock .bg {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1622718446797-a43935fa3e91?w=1920&q=80');
    background-size: cover;
    background-position: center;
    filter: brightness(0.4) saturate(1.2);
  }
  #slide-clock .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  #clock-time {
    font-size: 14vw;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: #fff;
    text-shadow: 0 0 80px rgba(102,126,234,0.5), 0 4px 20px rgba(0,0,0,0.6);
    line-height: 1;
  }
  #clock-seconds {
    font-size: 4vw;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.4em;
  }
  #clock-date {
    font-size: 2.6vw;
    font-weight: 300;
    color: rgba(255,255,255,0.7);
    margin-top: 10px;
    text-transform: capitalize;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }
  #clock-location {
    font-size: 1.2vw;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-top: 1vw;
  }

  /* ══════════════════════════════════
     2. WEATHER SLIDE
     ══════════════════════════════════ */
  #slide-weather {
    flex-direction: column;
    background: #000;
    overflow: hidden;
  }
  #slide-weather .weather-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: brightness(0.35) saturate(1.3);
    transition: background-image 1s ease;
  }
  #slide-weather .weather-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 3vw 4vw;
    height: 100%;
    justify-content: center;
  }
  .weather-city {
    font-size: 1.4vw;
    font-weight: 600;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-bottom: 1vw;
  }
  .weather-main {
    display: flex;
    align-items: center;
    gap: 2vw;
    margin-bottom: 1vw;
  }
  .weather-icon { font-size: 8vw; line-height: 1; }
  .weather-temp-block { text-align: center; }
  .weather-temp {
    font-size: 10vw;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 60px rgba(255,255,255,0.15);
  }
  .weather-desc {
    font-size: 2.2vw;
    font-weight: 300;
    color: rgba(255,255,255,0.7);
    text-transform: capitalize;
    margin-top: 0.5vw;
  }
  .weather-details {
    display: flex;
    gap: 3vw;
    font-size: 1.3vw;
    color: rgba(255,255,255,0.5);
    margin: 2vw 0;
  }
  .weather-details span { display: flex; align-items: center; gap: 0.4vw; }

  /* Hourly forecast strip */
  .weather-hourly {
    display: flex;
    gap: 1.5vw;
    margin-top: 1.5vw;
    padding: 1.2vw 2vw;
    background: rgba(255,255,255,0.06);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .weather-hour {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4vw;
    min-width: 4.5vw;
  }
  .weather-hour .wh-time {
    font-size: 0.9vw;
    color: rgba(255,255,255,0.4);
    font-weight: 600;
  }
  .weather-hour .wh-icon { font-size: 2vw; }
  .weather-hour .wh-temp {
    font-size: 1.2vw;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
  }
  .weather-hour .wh-rain {
    font-size: 0.75vw;
    color: #5bc0f8;
  }

  /* ══════════════════════════════════
     NEWS SLIDES (shared)
     ══════════════════════════════════ */
  .news-slide {
    flex-direction: column;
    padding: 0;
    overflow: hidden;
  }
  .news-slide .news-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: blur(40px) brightness(0.25) saturate(1.5);
    transform: scale(1.2);
  }
  .news-slide .news-inner {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    padding: 2.5vw 4vw 2vw;
  }

  /* Logo bar */
  .news-logo-bar {
    display: flex;
    align-items: center;
    gap: 1vw;
    margin-bottom: 1.5vw;
  }
  .news-logo-bar img {
    height: 3vw;
    object-fit: contain;
    filter: brightness(10);
  }
  .news-logo-bar .news-time-ago {
    margin-left: auto;
    font-size: 1.1vw;
    color: rgba(255,255,255,0.4);
    font-weight: 400;
  }

  /* Card */
  .news-card {
    display: flex;
    gap: 3vw;
    flex: 1;
    min-height: 0;
    width: 100%;
  }
  .news-card img.news-thumb {
    width: 42%;
    height: 100%;
    object-fit: cover;
    border-radius: 20px;
    flex-shrink: 0;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .news-card-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 0;
    overflow: hidden;
  }
  .news-card-text h2 {
    font-size: 2.8vw;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 1.5vw;
    color: #fff;
  }
  .news-card-text .news-desc-wrap {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    position: relative;
    mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
  }
  .news-card-text .news-desc-wrap p {
    font-size: 1.5vw;
    line-height: 1.7;
    color: rgba(255,255,255,0.6);
  }
  /* auto-scroll long text */
  .news-card-text .news-desc-wrap.scrolling p {
    animation: scrollText var(--scroll-duration, 8s) linear 2s 1;
  }
  @keyframes scrollText {
    0% { transform: translateY(0); }
    100% { transform: translateY(var(--scroll-distance, -200px)); }
  }

  /* Source-specific accent colors */
  .nos-slide { background: #0d0808; }
  .nos-slide .news-card-text h2 { color: #ffcfaa; }
  .nyt-slide { background: #0d0d0d; }
  .nyt-slide .news-card-text h2 { color: #e8e8e8; }
  .sky-slide { background: #080d18; }
  .sky-slide .news-card-text h2 { color: #c8d8f0; }
  .tweakers-slide { background: #0a0d08; }
  .tweakers-slide .news-card-text h2 { color: #c8e6a0; }

  /* NOS logo brightness fix */
  .nos-slide .news-logo-bar img { filter: none; }
  .nyt-slide .news-logo-bar img { filter: invert(1); }
  .sky-slide .news-logo-bar img { filter: none; }
  .tweakers-slide .news-logo-bar img { filter: none; }
</style>
</head>

<script>
// ══════════════════════════════════
//  CLOCK
// ══════════════════════════════════
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock-time').textContent = h + ':' + m;
  document.getElementById('clock-seconds').textContent = s;
  const days = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
  const months = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  document.getElementById('clock-date').textContent =
    days[now.getDay()] + ' ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
}
setInterval(updateClock, 1000);
updateClock();

// ══════════════════════════════════
//  WEATHER
// ══════════════════════════════════
const weatherIcons = {
  '113':'☀️','116':'⛅','119':'☁️','122':'☁️','143':'🌫️','176':'🌦️',
  '179':'🌨️','182':'🌨️','185':'🌨️','200':'⛈️','227':'🌨️','230':'❄️',
  '248':'🌫️','260':'🌫️','263':'🌦️','266':'🌧️','281':'🌨️','284':'🌨️',
  '293':'🌦️','296':'🌧️','299':'🌧️','302':'🌧️','305':'🌧️','308':'🌧️',
  '311':'🌨️','314':'🌨️','317':'🌨️','320':'🌨️','323':'🌨️','326':'🌨️',
  '329':'❄️','332':'❄️','335':'❄️','338':'❄️','350':'🌨️','353':'🌦️',
  '356':'🌧️','359':'🌧️','362':'🌨️','365':'🌨️','368':'🌨️','371':'❄️',
  '374':'🌨️','377':'🌨️','386':'⛈️','389':'⛈️','392':'⛈️','395':'❄️'
};

// Background photos per weather type (Unsplash)
const weatherPhotos = {
  sunny:   'https://images.unsplash.com/photo-1601297183305-6df142704ea2?w=1920&q=80',
  cloudy:  'https://images.unsplash.com/photo-1534088568595-a066f410bcda?w=1920&q=80',
  rainy:   'https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?w=1920&q=80',
  stormy:  'https://images.unsplash.com/photo-1605727216801-e27ce1d0cc28?w=1920&q=80',
  snowy:   'https://images.unsplash.com/photo-1491002052546-bf38f186af56?w=1920&q=80',
  foggy:   'https://images.unsplash.com/photo-1487621167305-5d248087c724?w=1920&q=80',
  default: 'https://images.unsplash.com/photo-1534088568595-a066f410bcda?w=1920&q=80'
};

function getWeatherCategory(code) {
  const c = parseInt(code);
  if (c === 113) return 'sunny';
  if ([116,119,122].includes(c)) return 'cloudy';
  if ([143,248,260].includes(c)) return 'foggy';
  if ([176,263,266,293,296,299,302,305,308,353,356,359].includes(c)) return 'rainy';
  if ([200,386,389,392].includes(c)) return 'stormy';
  if ([179,182,185,227,230,281,284,311,314,317,320,323,326,329,332,335,338,350,362,365,368,371,374,377,395].includes(c)) return 'snowy';
  return 'default';
}

async function fetchWeather() {
  try {
    const resp = await fetch('https://wttr.in/Zwolle?format=j1');
    const data = await resp.json();
    const cur = data.current_condition[0];
    const code = cur.weatherCode;
    const cat = getWeatherCategory(code);

    document.getElementById('weather-bg').style.backgroundImage = 'url(' + weatherPhotos[cat] + ')';
    document.getElementById('w-icon').textContent = weatherIcons[code] || '🌤️';
    document.getElementById('w-temp').textContent = cur.temp_C + '°';
    document.getElementById('w-desc').textContent = cur.lang_nl && cur.lang_nl[0] ? cur.lang_nl[0].value : cur.weatherDesc[0].value;
    document.getElementById('w-feel').textContent = 'Gevoels: ' + cur.FeelsLikeC + '°';
    document.getElementById('w-wind').textContent = 'Wind: ' + cur.windspeedKmph + ' km/h';
    document.getElementById('w-hum').textContent = 'Luchtvochtigheid: ' + cur.humidity + '%';
    document.getElementById('w-uv').textContent = 'UV: ' + cur.uvIndex;

    // Hourly forecast
    const hourlyContainer = document.getElementById('w-hourly');
    hourlyContainer.innerHTML = '';
    const now = new Date();
    const currentHour = now.getHours();
    const todayWeather = data.weather[0];
    const tomorrowWeather = data.weather[1];
    const allHours = [...(todayWeather ? todayWeather.hourly : []), ...(tomorrowWeather ? tomorrowWeather.hourly : [])];
    let shown = 0;
    for (const h of allHours) {
      const hTime = parseInt(h.time) / 100;
      const isToday = allHours.indexOf(h) < (todayWeather ? todayWeather.hourly.length : 0);
      if (isToday && hTime <= currentHour) continue;
      if (shown >= 8) break;
      const div = document.createElement('div');
      div.className = 'weather-hour';
      const timeLabel = String(hTime).padStart(2,'0') + ':00';
      div.innerHTML =
        '<span class="wh-time">' + timeLabel + '</span>' +
        '<span class="wh-icon">' + (weatherIcons[h.weatherCode] || '🌤️') + '</span>' +
        '<span class="wh-temp">' + h.tempC + '°</span>' +
        '<span class="wh-rain">' + h.chanceofrain + '%</span>';
      hourlyContainer.appendChild(div);
      shown++;
    }
  } catch(e) {
    document.getElementById('w-desc').textContent = 'Weer kon niet worden geladen';
  }
}
fetchWeather();
setInterval(fetchWeather, 600000);

// ══════════════════════════════════
//  TIME AGO helper
// ══════════════════════════════════
function timeAgo(dateStr) {
  const published = new Date(dateStr);
  const now = new Date();
  const diff = Math.floor((now - published) / 1000);
  if (diff < 60) return 'Zojuist';
  if (diff < 3600) return Math.floor(diff / 60) + ' min geleden';
  if (diff < 86400) return Math.floor(diff / 3600) + ' uur geleden';
  return Math.floor(diff / 86400) + ' dagen geleden';
}

// ══════════════════════════════════
//  NEWS FETCHER
// ══════════════════════════════════
const RSS_API = 'https://api.rss2json.com/v1/api.json?rss_url=';
const PLACEHOLDER_IMG = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600"><rect fill="#1a1a1a" width="800" height="600"/><text x="400" y="300" fill="#333" text-anchor="middle" font-family="sans-serif" font-size="24">Geen afbeelding</text></svg>');

function setupAutoScroll(wrapId) {
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  const p = wrap.querySelector('p');
  if (!p) return;
  // Reset first
  wrap.classList.remove('scrolling');
  p.style.animation = 'none';
  // Wait a frame then check overflow
  requestAnimationFrame(() => {
    const overflow = p.scrollHeight - wrap.clientHeight;
    if (overflow > 10) {
      const duration = Math.max(4, overflow / 30);
      wrap.style.setProperty('--scroll-distance', '-' + overflow + 'px');
      wrap.style.setProperty('--scroll-duration', duration + 's');
      wrap.classList.add('scrolling');
    }
  });
}

async function fetchNews(feedUrl, prefix, count) {
  try {
    const resp = await fetch(RSS_API + encodeURIComponent(feedUrl));
    const data = await resp.json();
    if (!data.items || !data.items.length) return;
    const items = data.items.slice(0, count);
    items.forEach((item, i) => {
      const titleEl = document.getElementById(prefix + '-title-' + i);
      const descEl = document.getElementById(prefix + '-desc-' + i);
      const imgEl = document.getElementById(prefix + '-img-' + i);
      const agoEl = document.getElementById(prefix + '-ago-' + i);
      const bgEl = document.getElementById(prefix + '-bg-' + i);

      if (titleEl) titleEl.textContent = item.title;
      if (agoEl) {
        agoEl.textContent = timeAgo(item.pubDate);
        agoEl.dataset.pubdate = item.pubDate;
      }

      if (descEl) {
        const tmp = document.createElement('div');
        tmp.innerHTML = item.description;
        descEl.textContent = tmp.textContent || tmp.innerText || '';
      }

      let imgSrc = item.thumbnail || item.enclosure?.link || '';
      if (!imgSrc) {
        const m = item.description.match(/<img[^>]+src="([^"]+)"/);
        imgSrc = m ? m[1] : PLACEHOLDER_IMG;
      }
      if (imgEl) imgEl.src = imgSrc;
      if (bgEl) bgEl.style.backgroundImage = 'url(' + imgSrc + ')';
    });
  } catch(e) {
    console.error('News fetch error for ' + prefix + ':', e);
  }
}

function loadAllNews() {
  fetchNews('https://feeds.nos.nl/nosnieuwsalgemeen', 'nos', 2);
  fetchNews('https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml', 'nyt', 2);
  fetchNews('https://feeds.skynews.com/feeds/rss/home.xml', 'sky', 2);
  fetchNews('https://tweakers.net/feeds/mixed.xml', 'tw', 2);
}
loadAllNews();
setInterval(loadAllNews, 300000);

// ══════════════════════════════════
//  SLIDESHOW
// ══════════════════════════════════
const slides = document.querySelectorAll('.slide');
let currentSlide = 0;
let progressTimer = null;
const progressBar = document.getElementById('progress-bar');

function showSlide(index) {
  slides.forEach(s => s.classList.remove('active'));
  slides[index].classList.add('active');
  currentSlide = index;

  // Setup auto-scroll for news slides
  const slideEl = slides[index];
  const wrapEl = slideEl.querySelector('.news-desc-wrap');
  if (wrapEl) setupAutoScroll(wrapEl.id);

  // Update time-ago for visible news
  const agoEl = slideEl.querySelector('.news-time-ago');
  if (agoEl && agoEl.dataset.pubdate) {
    agoEl.textContent = timeAgo(agoEl.dataset.pubdate);
  }

  const duration = parseInt(slides[index].dataset.duration) || 15000;
  progressBar.style.transition = 'none';
  progressBar.style.width = '0%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      progressBar.style.transition = 'width ' + duration + 'ms linear';
      progressBar.style.width = '100%';
    });
  });

  clearTimeout(progressTimer);
  progressTimer = setTimeout(() => {
    showSlide((currentSlide + 1) % slides.length);
  }, duration);
}

showSlide(0);
